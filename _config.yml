# ============================================================
# Site Settings
# ============================================================
title: "The Divan and the Sword"

description: >
  An independent scholarly research project dedicated to the study of Iranian
  political tradition, bureaucracy, governance, and the Persianate world.

url: "https://thedivanandthesword.github.io"
baseurl: "/tds-project"
repository: "thedivanandthesword/tds-project"

lang: "en"
timezone: "Europe/Berlin"

# ============================================================
# Author
# ============================================================
author:
  name: "Hamid Reza Asadian Dehaghani"
  email: "divan.and.sword@gmail.com"
  orcid: "https://orcid.org/0009-0001-5921-5698"

# ============================================================
# Build Settings
# ============================================================
markdown: kramdown
highlighter: rouge
permalink: pretty

# ============================================================
# Defaults
# ============================================================
defaults:
  - scope:
      path: ""
    values:
      layout: default

# ============================================================
# Excluded Files
# ============================================================
exclude:
  - .git/
  - .github/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md
  - LICENSE
  - CITATION.cff
  - CHANGELOG.md
  - RELEASE.md
  - RELEASE_GUIDE.md
  - VERSIONING.md
  - ROADMAP.md
  - GITHUB_PAGES.md
  - RELEASE_NOTES/

# ============================================================
# Plugins (GitHub Pages Compatible)
# ============================================================
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# ============================================================
# SEO
# ============================================================
logo: "/assets/images/logo/tds-logo.png"

twitter:
  card: summary

social:
  name: "Hamid Reza Asadian Dehaghani"
  links:
    - "https://orcid.org/0009-0001-5921-5698"
    - "https://github.com/thedivanandthesword"

# ============================================================
# GitHub
# ============================================================
github:
  username: "thedivanandthesword"
  repository: "tds-project"
