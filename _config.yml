title: "The Divan and the Sword"
description: "An independent scholarly research project on Iranian political tradition, bureaucracy, governance, and the Persianate world."

url: "https://thedivanandthesword.github.io"
baseurl: "/tds-project"

repository: "thedivanandthesword/tds-project"

author:
  name: "Hamid Reza Asadian Dehaghani"
  email: "divan.and.sword@gmail.com"
  orcid: "https://orcid.org/0009-0001-5921-5698"

github:
  username: "thedivanandthesword"
  repository: "tds-project"
  pages_url: "https://thedivanandthesword.github.io/tds-project/"

license:
  name: "Creative Commons Attribution-ShareAlike 4.0 International"
  short_name: "CC BY-SA 4.0"
  url: "https://creativecommons.org/licenses/by-sa/4.0/"

project:
  status: "active"
  version: "1.0.1"
  release: "v1.0.1"
  release_title: "Public Scholarly Release"

zenodo:
  enabled: true
  doi: ""

social:
  preview_image: "/assets/images/social-preview.png"
  logo: "/assets/images/logo/tds-logo.png"

keywords:
  - Iranian political tradition
  - Iranian studies
  - Persianate world
  - bureaucracy
  - governance
  - administrative history
  - political thought
  - state formation
  - historical sociology
  - digital humanities

header_pages:
  - index.md
  - about.md
  - research.md
  - book.md
  - documents.md
  - roadmap.md
  - contact.md

markdown: kramdown
highlighter: rouge
permalink: pretty

timezone: Europe/Berlin
lang: en

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
    values:
      layout: default
