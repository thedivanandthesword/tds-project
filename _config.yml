title: "The Divan and the Sword"

description: "An independent scholarly research project dedicated to the study of Iranian political tradition, bureaucracy, governance, and the Persianate world."

url: "https://thedivanandthesword.github.io"
baseurl: "/tds-project"

repository: "thedivanandthesword/tds-project"

author:
  name: "Hamid Reza Asadian Dehaghani"
  email: "divan.and.sword@gmail.com"
  orcid: "https://orcid.org/0009-0001-5921-5698"

github:
  username: "thedivanandthesword"
  repository: "tds-project"

license:
  name: "Creative Commons Attribution-ShareAlike 4.0 International"
  short_name: "CC BY-SA 4.0"
  url: "https://creativecommons.org/licenses/by-sa/4.0/"

theme: minima

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

markdown: kramdown
highlighter: rouge

permalink: pretty

timezone: Europe/Berlin

lang: en

defaults:
  -
    scope:
      path: ""
    values:
      layout: default

exclude:
  - README.md
  - RELEASE.md
  - CHANGELOG.md
  - STATUS.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/

collections: {}

social_links:
  github: thedivanandthesword

logo: "/assets/images/logo/tds-logo.png"

show_downloads: false

future: false

safe: true
